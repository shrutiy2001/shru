<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Mood – TuneAura</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="mood-page">

    <!-- Floating shapes for aesthetic background -->
    <div class="floating-shape shape1"></div>
    <div class="floating-shape shape2"></div>
    <div class="floating-shape shape3"></div>

    <h1 class="mood-title">Pick Your Mood 🎵</h1>
    <p class="mood-sub">Choose a mood and explore songs that match your vibe</p>

    <div class="mood-grid">

        <!-- HAPPY -->
        <div class="mood-card"
            style="background-image:url('https://images.unsplash.com/photo-1514525253161-7a46d19cd819?fm=jpg&q=60&w=1000'); background-size:cover; background-position:center;"
            onclick="goMood('happy')">
            <div class="mood-emoji">😊</div>
            <div class="mood-name">Happy</div>
        </div>

        <!-- SAD -->
        <div class="mood-card"
            style="background-image:url('https://images.unsplash.com/photo-1497250681960-ef046c08a56e?auto=format&fit=crop&w=1200&q=80'); background-size:cover; background-position:center;"
            onclick="goMood('sad')">
            <div class="mood-emoji">😢</div>
            <div class="mood-name">Sad</div>
        </div>

        <!-- PARTY -->
        <div class="mood-card"
            style="background-image:url('https://images.unsplash.com/photo-1519671482749-fd09be7ccebf?auto=format&fit=crop&w=1200&q=80'); background-size:cover; background-position:center;"
            onclick="goMood('party')">
            <div class="mood-emoji">🎉</div>
            <div class="mood-name">Party</div>
        </div>

        <!-- CHILL -->
        <div class="mood-card"
            style="background-image:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=80'); background-size:cover; background-position:center;"
            onclick="goMood('chill')">
            <div class="mood-emoji">😌</div>
            <div class="mood-name">Chill</div>
        </div>

        <!-- ROMANTIC -->
        <div class="mood-card"
            style="background-image:url('https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d?auto=format&fit=crop&w=1200&q=80'); background-size:cover; background-position:center;"
            onclick="goMood('romantic')">
            <div class="mood-emoji">❤️</div>
            <div class="mood-name">Romantic</div>
        </div>

        <!-- ENERGETIC -->
        <div class="mood-card"
            style="background-image:url('https://images.unsplash.com/photo-1525182008055-f88b95ff7980?auto=format&fit=crop&w=1200&q=80'); background-size:cover; background-position:center;"
            onclick="goMood('energetic')">
            <div class="mood-emoji">⚡</div>
            <div class="mood-name">Energetic</div>
        </div>

    </div>

    <script>
        function goMood(mood) {
            window.location.href = "/results?q=" + mood;
        }
    </script>

</body>
</html>
